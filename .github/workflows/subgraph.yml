name: Subgraph

on:
  pull_request:
    paths:
      - '.github/workflows/subgraph.yml'
      - 'apps/subgraph/**'
      - 'biome.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

jobs:
  test-and-build:
    name: Codegen, test, build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @dealbot/subgraph test

      - name: Build calibration
        run: pnpm --filter @dealbot/subgraph run build:calibration

      - name: Build mainnet
        run: pnpm --filter @dealbot/subgraph run build:mainnet
