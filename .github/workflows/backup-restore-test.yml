name: Backup Restoration Test

on:
  schedule:
    - cron: "0 2 * * 0" # Weekly on Sunday at 2 AM UTC
  workflow_dispatch: # Allow manual trigger
    inputs:
      project:
        description: "Project to test (prod, staging, or both)"
        required: false
        default: "both"
        type: choice
        options:
          - prod
          - staging
          - both

jobs:
  restore-prod:
    name: Restore Prod Database Backup
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.project == 'prod' || github.event.inputs.project == 'both'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run Backup Restoration Test
        id: restore_test
        run: |
          chmod +x .github/scripts/test-backup-restore.sh
          .github/scripts/test-backup-restore.sh
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_PROD_DB_URL }}
          PROJECT_LABEL: prod
          PUSHGATEWAY_URL: ${{ secrets.PUSHGATEWAY_URL }}
        continue-on-error: true

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-restore-test-logs
          path: |
            /tmp/backup-restore-test-*.log
            /tmp/backup-prod-*/*.sql
          retention-days: 7

      - name: Report Failure
        if: steps.restore_test.outcome == 'failure'
        run: |
          echo "::error::Prod backup restoration test failed"
          exit 1

  restore-staging:
    name: Restore Staging Database Backup
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.project == 'staging' || github.event.inputs.project == 'both'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run Backup Restoration Test
        id: restore_test
        run: |
          chmod +x .github/scripts/test-backup-restore.sh
          .github/scripts/test-backup-restore.sh
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
          PROJECT_LABEL: staging
          PUSHGATEWAY_URL: ${{ secrets.PUSHGATEWAY_URL }}
        continue-on-error: true

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-restore-test-logs
          path: |
            /tmp/backup-restore-test-*.log
            /tmp/backup-staging-*/*.sql
          retention-days: 7

      - name: Report Failure
        if: steps.restore_test.outcome == 'failure'
        run: |
          echo "::error::Staging backup restoration test failed"
          exit 1

  notify-results:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [restore-prod, restore-staging]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Check Results
        run: |
          echo "Prod result: ${{ needs.restore-prod.result }}"
          echo "Staging result: ${{ needs.restore-staging.result }}"

          if [[ "${{ needs.restore-prod.result }}" == "failure" ]] || [[ "${{ needs.restore-staging.result }}" == "failure" ]]; then
            echo "::error::One or more backup restoration tests failed. Check the job logs and artifacts for details."
            exit 1
          fi
