name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - pre-release

concurrency:
  # Release-please merges must complete so later retagging can find the sha image.
  group: ${{ github.ref_name == 'main' && startsWith(github.event.head_commit.message, 'chore: release to production') && format('docker-build-release-{0}', github.sha) || format('docker-build-{0}', github.ref) }}
  cancel-in-progress: ${{ !(github.ref_name == 'main' && startsWith(github.event.head_commit.message, 'chore: release to production')) }}

env:
  REGISTRY: ghcr.io

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            web:
              - 'apps/web/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  integration-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.web == 'true'
    uses: ./.github/workflows/reusable-k8s-test.yml

  build-backend:
    needs: [detect-changes, integration-test]
    if: needs.detect-changes.outputs.backend == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      app: backend
      dockerfile: apps/backend/Dockerfile
      image: filozone/dealbot-backend
      tags: |
        ${{ github.ref_name == 'pre-release' && format('ghcr.io/filozone/dealbot-backend:pre-release-{0}', github.sha) || format('ghcr.io/filozone/dealbot-backend:sha-{0}', github.sha) }}
        ${{ github.ref_name == 'main' && format('ghcr.io/filozone/dealbot-backend:sha-{0}-{1}', github.run_number, github.sha) || '' }}
      summary: |
        echo "backend image (sha): ${{ github.ref_name == 'pre-release' && format('pre-release-{0}', github.sha) || format('sha-{0}', github.sha) }}"
        ${{ github.ref_name == 'main' && format('echo "backend image (ordered): ghcr.io/filozone/dealbot-backend:sha-{0}-{1}"', github.run_number, github.sha) || '' }}

  build-web:
    needs: [detect-changes, integration-test]
    if: needs.detect-changes.outputs.web == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      app: web
      dockerfile: apps/web/Dockerfile
      image: filozone/dealbot-web
      tags: |
        ${{ github.ref_name == 'pre-release' && format('ghcr.io/filozone/dealbot-web:pre-release-{0}', github.sha) || format('ghcr.io/filozone/dealbot-web:sha-{0}', github.sha) }}
        ${{ github.ref_name == 'main' && format('ghcr.io/filozone/dealbot-web:sha-{0}-{1}', github.run_number, github.sha) || '' }}
      summary: |
        echo "web image (sha): ${{ github.ref_name == 'pre-release' && format('pre-release-{0}', github.sha) || format('sha-{0}', github.sha) }}"
        ${{ github.ref_name == 'main' && format('echo "web image (ordered): ghcr.io/filozone/dealbot-web:sha-{0}-{1}"', github.run_number, github.sha) || '' }}
