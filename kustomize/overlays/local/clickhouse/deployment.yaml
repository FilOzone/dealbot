apiVersion: apps/v1
kind: Deployment
metadata:
  name: dealbot-clickhouse
  labels:
    app.kubernetes.io/name: dealbot-clickhouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dealbot-clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dealbot-clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24-alpine
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
            - name: native
              containerPort: 9000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: clickhouse-storage
              mountPath: /var/lib/clickhouse
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: clickhouse-storage
          persistentVolumeClaim:
            claimName: dealbot-clickhouse
        - name: initdb
          configMap:
            name: dealbot-clickhouse-initdb
